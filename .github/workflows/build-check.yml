name: Nix Configuration Build Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  linux-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # Hunk's pinned bun2nix evaluates cache-entry-creator from a flake-input
      # subdirectory. On a fresh Linux runner, that subdirectory can be referenced
      # before Nix has registered it as a valid store path, which breaks
      # `nix flake check --no-build` while evaluating the Home Manager profile.
      - name: Realise bun2nix cache-entry-creator source
        run: |
          nix eval --raw --impure --accept-flake-config --expr '
            builtins.path {
              path = (builtins.getFlake (toString ./.)).inputs.hunk.inputs.bun2nix + "/programs/cache-entry-creator";
              name = "cache-entry-creator";
            }
          '

      - name: Check Nix flake outputs
        run: nix flake check --no-build --accept-flake-config

      - name: Verify NixOS configuration (dry-run)
        run: nix build .#nixosConfigurations.framework.config.system.build.toplevel --dry-run --accept-flake-config

      - name: Check Nix formatting
        run: nix fmt --accept-flake-config -- --ci .

      - name: Lint Nix with statix
        run: nix shell --accept-flake-config --inputs-from . nixpkgs#statix --command statix check .

      - name: Lint helper scripts with shellcheck
        run: |
          nix shell --accept-flake-config --inputs-from . nixpkgs#shellcheck --command bash -lc '
            shellcheck \
              scripts/*.sh \
              home-manager/darwin/home-cleanup.sh \
              home-manager/nixos/audio-keep-alive/audio-keep-alive.sh \
              home-manager/nixos/darkman/darkman-switch-mode.sh \
              home-manager/nixos/darkman/monitor-hotplug.sh \
              home-manager/nixos/niri/brightness-ctl.sh \
              home-manager/nixos/niri/toggle-abm.sh \
              home-manager/nixos/spotify-suspend/handle-spotify-suspend.sh
          '

      - name: Run pi extension tests
        run: nix build .#checks.x86_64-linux.pi-extension-tests --accept-flake-config

  darwin-dry-run:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Verify Darwin configuration (dry-run)
        run: nix build .#darwinConfigurations.macbook.system --dry-run --accept-flake-config
